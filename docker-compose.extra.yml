services:
  openclaw-gateway:
    volumes:
      - openclaw_home:/home/node
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
      - ${HOME}/.codex:/home/node/.codex:ro
      - /projects:/projects:rw
  openclaw-cli:
    volumes:
      - openclaw_home:/home/node
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
      - ${HOME}/.codex:/home/node/.codex:ro
      - /projects:/projects:rw
volumes:
  openclaw_home:
